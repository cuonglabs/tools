<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CuongLabs Database Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f6f8; padding-top: 30px; padding-bottom: 30px; }
        .card { margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: none; }
        #dashboard { display: none; }
        .loading-status { font-style: italic; color: #6c757d; font-size: 14px; }
        
        /* 3. CSS CHO HIỆU ỨNG LOADING OVERLAY CHỜ SERVER MƯỢT MÀ */
        #loadingOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(33, 37, 41, 0.6);
            backdrop-filter: blur(3px);
            z-index: 9999;
            display: none;
            justify-content: center;
            align-items: center;
            transition: all 0.2s ease-in-out;
        }
        .spinner-box {
            background: #fff;
            padding: 25px 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            text-align: center;
        }
    </style>
</head>
<body>

<div id="loadingOverlay">
    <div class="spinner-box">
        <div class="spinner-border text-primary mb-3" role="status" style="width: 2.5rem; height: 2.5rem;"></div>
        <div id="loadingMessage" class="fw-bold text-secondary fs-6">Đang kết nối server...</div>
    </div>
</div>

<div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 10000;">
    <div id="liveToast" class="toast align-items-center border-0" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="d-flex">
            <div class="toast-body fw-bold" id="toastBody">Thao tác thành công!</div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
    </div>
</div>

<div class="container" style="max-width: 950px;">

    <div id="loginCard" class="card mx-auto" style="max-width: 400px; margin-top: 80px;">
        <div class="card-body p-4">
            <h3 class="card-title text-center mb-4">Hệ Thống Đăng Nhập</h3>
            <div class="mb-3">
                <input id="username" class="form-control" placeholder="Tên đăng nhập">
            </div>
            <div class="mb-4">
                <input id="password" type="password" class="form-control" placeholder="Mật khẩu">
            </div>
            <button class="btn btn-primary w-100" onclick="login()">Đăng Nhập</button>
        </div>
    </div>

    <div id="dashboard">
        
        <div class="card">
            <div class="card-body d-flex justify-content-between align-items-center flex-wrap gap-2">
                <div id="userInfo" class="fs-5"></div>
                <div>
                    <button class="btn btn-outline-secondary btn-sm me-2" type="button" data-bs-toggle="collapse" data-bs-target="#settingsCollapse">
                        ⚙️ Cấu hình & Bảo mật
                    </button>
                    <button class="btn btn-danger btn-sm" onclick="logout()">Đăng xuất</button>
                </div>
            </div>
        </div>

        <div class="collapse" id="settingsCollapse">
            <div class="card border-info">
                <div class="card-header bg-info bg-opacity-10 text-dark fw-bold">Cài Đặt Tài Khoản & Tiện Ích Cấu Hình</div>
                <div class="card-body">
                    <div class="row g-4">
                        <div class="col-md-5 border-end">
                            <h5 class="h6 text-primary mb-3">🔒 Thay Đổi Mật Khẩu</h5>
                            <div class="mb-2">
                                <input id="oldPass" type="password" class="form-control form-control-sm" placeholder="Mật khẩu cũ">
                            </div>
                            <div class="mb-3">
                                <input id="newPassUser" type="password" class="form-control form-control-sm" placeholder="Mật khẩu mới">
                            </div>
                            <button class="btn btn-primary btn-sm w-100" onclick="changePassword()">Cập nhật mật khẩu</button>
                        </div>
                        
                        <div class="col-md-7">
                            <h5 class="h6 text-success mb-3">🛠️ Thiết Lập Bộ Nhớ Gợi Ý & URL Nhanh</h5>
                            <div class="mb-2">
                                <label class="form-label small mb-1 text-muted">Danh sách URL (Định dạng: Tên|Link - mỗi dòng 1 link)</label>
                                <textarea id="cfgUrls" class="form-control form-control-sm" rows="2" placeholder="Google|https://google.com"></textarea>
                            </div>
                            <div class="mb-2">
                                <label class="form-label small mb-1 text-muted">Gợi ý nhập cho cột Tên - Name (Cách nhau bằng dấu phẩy)</label>
                                <input id="cfgSuggestNames" class="form-control form-control-sm" placeholder="Sản phẩm A, Thiết bị B">
                            </div>
                            <div class="mb-3">
                                <label class="form-label small mb-1 text-muted">Gợi ý nhập cho cột Giá trị - Value (Cách nhau bằng dấu phẩy)</label>
                                <input id="cfgSuggestValues" class="form-control form-control-sm" placeholder="Hoạt động, Tạm dừng">
                            </div>
                            <button class="btn btn-success btn-sm float-end" onclick="saveUserConfigs(false)">Lưu cấu hình tiện ích</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="quickLinksCard" class="card" style="display:none;">
            <div class="card-body p-2 bg-light d-flex align-items-center flex-wrap">
                <span class="me-2 small text-muted fw-bold">🔗 Truy cập nhanh:</span>
                <div id="quickLinksContainer" class="d-flex flex-wrap gap-1"></div>
            </div>
        </div>

        <div id="adminPanel" class="card border-warning" style="display:none">
            <div class="card-body">
                <h4 class="card-title h5 text-warning mb-3">Tạo Tài Khoản Thành Viên Mới</h4>
                <div class="row g-2 mb-4">
                    <div class="col-md-4">
                        <input id="newUser" class="form-control" placeholder="Username mới">
                    </div>
                    <div class="col-md-4">
                        <input id="newPass" type="password" class="form-control" placeholder="Password mới">
                    </div>
                    <div class="col-md-2">
                        <select id="newRole" class="form-select">
                            <option value="user">User thường</option>
                            <option value="admin">Quản trị viên (Admin)</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <button class="btn btn-warning w-100 text-dark" onclick="createUser()">Tạo User</button>
                    </div>
                </div>

                <hr class="text-muted">
                <h4 class="card-title h5 text-danger mb-3">Reset Mật Khẩu Thành Viên</h4>
                <div class="row g-2">
                    <div class="col-md-5">
                        <input id="resetTargetUser" class="form-control" placeholder="Username cần khôi phục">
                    </div>
                    <div class="col-md-5">
                        <input id="resetNewPass" type="password" class="form-control" placeholder="Mật khẩu mới cấp lại">
                    </div>
                    <div class="col-md-2">
                        <button class="btn btn-danger w-100" onclick="resetPasswordByAdmin()">Cấp mật khẩu mới</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-body">
                <h4 class="card-title h5 mb-3" id="form-title">Thêm Dữ Liệu Mới</h4>
                <input type="hidden" id="editId"> 
                <div class="row g-2">
                    <div class="col-md-4">
                        <input id="name" class="form-control" placeholder="Tên đối tượng (Name)" list="datalistNames">
                        <datalist id="datalistNames"></datalist>
                    </div>
                    <div class="col-md-4">
                        <input id="value" class="form-control" placeholder="Giá trị (Value)" list="datalistValues">
                        <datalist id="datalistValues"></datalist>
                    </div>
                    <div class="col-md-2">
                        <button id="btn-submit" class="btn btn-success w-100" onclick="saveData()">Thêm Mới</button>
                    </div>
                    <div class="col-md-2" id="cancel-col" style="display:none;">
                        <button class="btn btn-secondary w-100" onclick="cancelEdit()">Hủy Sửa</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h4 class="card-title h5 m-0">Danh Sách Dữ Liệu</h4>
                    <div>
                        <span id="loadStatus" class="loading-status me-2"></span>
                        <button class="btn btn-outline-primary btn-sm" onclick="loadData(true)">Làm mới dữ liệu</button>
                    </div>
                </div>
                
                <div class="table-responsive">
                    <table class="table table-striped table-hover align-middle">
                        <thead class="table-light">
                            <tr id="tableHeader"></tr>
                        </thead>
                        <tbody id="tbody">
                            <tr><td id="empty-row" class="text-center text-muted">Đang tải dữ liệu...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxX4l1AfUFroLcgazD-ijuKLJrnCfRU0U0o8oR4cfVSqmFRlj7h-vhgstqcqBEk4m17/exec";

function getToken() {
    return localStorage.getItem("token") || "";
}

function logout() {
    localStorage.clear();
    location.reload();
}

// 3. HÀM CHẠY ANIMATION CHỜ (WAITING) VÀ HIỂN THỊ THÔNG BÁO (SUCCESS TOAST)
function toggleLoading(show, message = "Đang xử lý...") {
    const overlay = document.getElementById("loadingOverlay");
    const msgEl = document.getElementById("loadingMessage");
    if (show) {
        msgEl.innerText = message;
        overlay.style.display = "flex";
    } else {
        overlay.style.display = "none";
    }
}

function showToast(message, type = "success") {
    const toastEl = document.getElementById("liveToast");
    const toastBody = document.getElementById("toastBody");
    
    toastEl.classList.remove("bg-success", "bg-danger", "bg-warning", "text-white", "text-dark");
    if (type === "success") {
        toastEl.classList.add("bg-success", "text-white");
    } else if (type === "danger") {
        toastEl.classList.add("bg-danger", "text-white");
    } else {
        toastEl.classList.add("bg-warning", "text-dark");
    }
    
    toastBody.innerText = message;
    const toast = new bootstrap.Toast(toastEl, { delay: 3000 });
    toast.show();
}

async function api(data) {
    try {
        const res = await fetch(API_URL, {
            method: "POST",
            body: JSON.stringify(data)
        });
        return await res.json();
    } catch (e) {
        return { success: false, error: "Không thể kết nối đến máy chủ API" };
    }
}

async function login() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value;

    if(!username || !password) {
        showToast("Vui lòng nhập đầy đủ thông tin tài khoản!", "danger");
        return;
    }

    toggleLoading(true, "Đang xác thực tài khoản đăng nhập...");
    const result = await api({ action: "login", username, password });
    toggleLoading(false);

    if (!result.success) {
        showToast(result.error, "danger");
        return;
    }

    localStorage.setItem("token", result.token);
    localStorage.setItem("role", result.role);
    localStorage.setItem("username", result.username);

    showToast("Đăng nhập thành công!", "success");
    showDashboard();
}

async function loadData(isManualClick = false) {
    document.getElementById("loadStatus").innerText = "Đang đồng bộ...";
    if(isManualClick) toggleLoading(true, "Đang tải dữ liệu từ Google Sheet...");

    const result = await api({ action: "list", token: getToken() });
    if(isManualClick) toggleLoading(false);

    if (result.success === false) {
        showToast("Phiên làm việc hết hạn hoặc lỗi: " + result.error, "danger");
        setTimeout(logout, 2000);
        return;
    }

    const myRole = localStorage.getItem("role");
    const tableHeader = document.getElementById("tableHeader");
    let headerHtml = `<th>Name</th><th>Value</th><th>Thời gian tạo</th><th>Người tạo</th>`;
    if (myRole === "admin") {
        headerHtml += `<th style="width: 130px;">Thao tác</th>`;
    }
    tableHeader.innerHTML = headerHtml;

    const tbody = document.getElementById("tbody");
    tbody.innerHTML = "";

    const rows = result.data || [];
    const totalCols = (myRole === "admin") ? 5 : 4;

    if(rows.length === 0) {
        tbody.innerHTML = `<tr><td colspan="${totalCols}" class="text-center text-muted">Cơ sở dữ liệu đang trống.</td></tr>`;
        updateTimestamp();
        return;
    }

    rows.forEach(row => {
        let dateStr = row.Created;
        if(dateStr && !isNaN(Date.parse(dateStr))) {
            dateStr = new Date(dateStr).toLocaleString('vi-VN');
        }

        const safeName = String(row.Name || "").replace(/'/g, "\\'").replace(/"/g, '&quot;');
        const safeValue = String(row.Value || "").replace(/'/g, "\\'").replace(/"/g, '&quot;');

        let rowHtml = `
        <tr>
            <td><strong>${row.Name || ""}</strong></td>
            <td>${row.Value || ""}</td>
            <td>${dateStr || ""}</td>
            <td><span class="badge bg-light text-dark border">${row.CreatedBy || "N/A"}</span></td>
        `;

        if (myRole === "admin") {
            rowHtml += `
            <td>
                <button class="btn btn-sm btn-warning me-1 text-dark" onclick="startEdit('${row.ID}', '${safeName}', '${safeValue}')">Sửa</button>
                <button class="btn btn-sm btn-danger" onclick="deleteData('${row.ID}')">Xóa</button>
            </td>`;
        }

        rowHtml += `</tr>`;
        tbody.innerHTML += rowHtml;
    });
    
    updateTimestamp();
    if(isManualClick) showToast("Làm mới dữ liệu thành công!", "success");
}

function updateTimestamp() {
    const now = new Date();
    const hh = String(now.getHours()).padStart(2, '0');
    const mm = String(now.getMinutes()).padStart(2, '0');
    const dd = String(now.getDate()).padStart(2, '0');
    const MM = String(now.getMonth() + 1).padStart(2, '0');
    const yyyy = now.getFullYear();
    document.getElementById("loadStatus").innerText = `Đã cập nhật lúc ${hh}:${mm} ${dd}/${MM}/${yyyy}`;
}

function startEdit(id, name, value) {
    document.getElementById("editId").value = id;
    document.getElementById("name").value = name;
    document.getElementById("value").value = value;
    document.getElementById("form-title").innerText = "Chỉnh Sửa Dữ Liệu";
    
    const btnSubmit = document.getElementById("btn-submit");
    btnSubmit.innerText = "Cập nhật";
    btnSubmit.className = "btn btn-warning w-100 text-dark";
    
    document.getElementById("cancel-col").style.display = "block";
    document.getElementById("form-title").scrollIntoView({ behavior: 'smooth' });
}

function cancelEdit() {
    document.getElementById("editId").value = "";
    document.getElementById("name").value = "";
    document.getElementById("value").value = "";
    document.getElementById("form-title").innerText = "Thêm Dữ Liệu Mới";
    
    const btnSubmit = document.getElementById("btn-submit");
    btnSubmit.innerText = "Thêm Mới";
    btnSubmit.className = "btn btn-success w-100";
    document.getElementById("cancel-col").style.display = "none";
}

async function saveData() {
    const id = document.getElementById("editId").value;
    const name = document.getElementById("name").value.trim();
    const value = document.getElementById("value").value.trim();

    if(!name || !value) {
        showToast("Vui lòng nhập cả Name và Value!", "danger");
        return;
    }

    const isEdit = id !== "";
    const action = isEdit ? "update" : "add";
    const payload = { action, token: getToken(), name, value };
    if (isEdit) payload.id = id;

    toggleLoading(true, "Đang truyền tải dữ liệu đến server...");
    const result = await api(payload);
    toggleLoading(false);

    if(result.success) {
        showToast(isEdit ? "Cập nhật dữ liệu thành công!" : "Thêm mới bản ghi thành công!", "success");
        
        // 2. KHỐI TỰ ĐỘNG LƯU NAME/VALUE MỚI VÀO CONFIGS KHI THÊM MỚI CHƯA TỒN TẠI
        if (!isEdit) {
            let currentNames = document.getElementById("cfgSuggestNames").value.split(",").map(x => x.trim()).filter(x => x !== "");
            let currentValues = document.getElementById("cfgSuggestValues").value.split(",").map(x => x.trim()).filter(x => x !== "");
            let isConfigChanged = false;

            if (!currentNames.includes(name)) {
                currentNames.push(name);
                isConfigChanged = true;
            }
            if (!currentValues.includes(value)) {
                currentValues.push(value);
                isConfigChanged = true;
            }

            if (isConfigChanged) {
                document.getElementById("cfgSuggestNames").value = currentNames.join(", ");
                document.getElementById("cfgSuggestValues").value = currentValues.join(", ");
                // Gọi lưu configs âm thầm lên Database (truyền tham số true để chạy ngầm)
                await saveUserConfigs(true);
            }
        }

        cancelEdit();
        loadData(false);
    } else {
        showToast("Lỗi hệ thống: " + result.error, "danger");
    }
}

async function deleteData(id) {
    if (!confirm("Bạn có chắc chắn muốn xóa vĩnh viễn dòng dữ liệu này?")) return;

    toggleLoading(true, "Đang thực hiện lệnh xóa dữ liệu...");
    const result = await api({ action: "delete", token: getToken(), id });
    toggleLoading(false);

    if(result.success) {
        showToast("Xóa bản ghi thành công!", "success");
        loadData(false);
    } else {
        showToast("Lỗi khi xóa: " + result.error, "danger");
    }
}

async function createUser() {
    const userEl = document.getElementById("newUser");
    const passEl = document.getElementById("newPass");
    const role = document.getElementById("newRole").value;

    const username = userEl.value.trim();
    const password = passEl.value;

    if(!username || !password) {
        showToast("Vui lòng không để trống ô tài khoản mới!", "danger");
        return;
    }

    toggleLoading(true, "Đang khởi tạo thành viên mới...");
    const result = await api({ action: "createUser", token: getToken(), username, password, role });
    toggleLoading(false);

    if(result.success) {
        showToast("Tạo tài khoản thành viên mới thành công!", "success");
        userEl.value = "";
        passEl.value = "";
    } else {
        showToast("Lỗi: " + result.error, "danger");
    }
}

async function resetPasswordByAdmin() {
    const targetUsername = document.getElementById("resetTargetUser").value.trim();
    const newPassword = document.getElementById("resetNewPass").value;

    if (!targetUsername || !newPassword) {
        showToast("Vui lòng điền đầy đủ Username đích và mật khẩu mới cấp!", "danger");
        return;
    }

    if (!confirm(`Bạn chắc chắn muốn khôi phục mật khẩu tài khoản [${targetUsername}]?`)) return;

    toggleLoading(true, "Đang đặt lại mật khẩu thành viên...");
    const result = await api({ action: "resetPassword", token: getToken(), targetUsername, newPassword });
    toggleLoading(false);

    if (result.success) {
        showToast(`Reset mật khẩu tài khoản ${targetUsername} thành công!`, "success");
        document.getElementById("resetTargetUser").value = "";
        document.getElementById("resetNewPass").value = "";
    } else {
        showToast("Lỗi: " + result.error, "danger");
    }
}

async function changePassword() {
    const oldPassword = document.getElementById("oldPass").value;
    const newPassword = document.getElementById("newPassUser").value;

    if (!oldPassword || !newPassword) {
        showToast("Vui lòng nhập đủ cả mật khẩu cũ và mật khẩu mới!", "danger");
        return;
    }

    toggleLoading(true, "Đang yêu cầu đổi mật khẩu bảo mật...");
    const result = await api({ action: "changePassword", token: getToken(), oldPassword, newPassword });
    toggleLoading(false);

    if (result.success) {
        showToast("Đổi mật khẩu thành công! Bạn sẽ tự đăng xuất sau 2 giây...", "success");
        setTimeout(logout, 2000);
    } else {
        showToast("Lỗi: " + result.error, "danger");
    }
}

async function loadUserConfigs(isSilent = false) {
    if(!isSilent) toggleLoading(true, "Đang đồng bộ giao diện tiện ích...");
    const result = await api({ action: "getUserConfigs", token: getToken() });
    if(!isSilent) toggleLoading(false);

    if (!result.success) return;
    const configs = result.configs || {};

    // --- Xử lý liên kết URL nhanh ---
    const urls = configs.urls || [];
    const container = document.getElementById("quickLinksContainer");
    const cardBlock = document.getElementById("quickLinksCard");
    
    container.innerHTML = "";
    if (urls.length > 0) {
        cardBlock.style.display = "block";
        let rawTextareaValue = "";
        urls.forEach(item => {
            rawTextareaValue += `${item.title}|${item.url}\n`;
            const a = document.createElement("a");
            a.href = item.url; a.target = "_blank";
            a.className = "btn btn-xs btn-outline-dark pt-0 pb-0 ps-2 pe-2 small bg-white border shadow-sm";
            a.style.style = "font-size: 13px;"; a.innerText = item.title;
            container.appendChild(a);
        });
        document.getElementById("cfgUrls").value = rawTextareaValue.trim();
    } else {
        cardBlock.style.display = "none";
        document.getElementById("cfgUrls").value = "";
    }

    // --- Xử lý danh sách gợi ý nhập liệu (Datalist) ---
    const names = configs.suggestedNames || [];
    const datalistNames = document.getElementById("datalistNames");
    datalistNames.innerHTML = "";
    names.forEach(n => { datalistNames.innerHTML += `<option value="${n}">`; });
    document.getElementById("cfgSuggestNames").value = names.join(", ");

    const values = configs.suggestedValues || [];
    const datalistValues = document.getElementById("datalistValues");
    datalistValues.innerHTML = "";
    values.forEach(v => { datalistValues.innerHTML += `<option value="${v}">`; });
    document.getElementById("cfgSuggestValues").value = values.join(", ");
}

// 2. HÀM UPDATE CONFIGS HỖ TRỢ THAM SỐ CHẠY NGẦM (SILENT) KHÔNG GÂY LÀM PHIỀN USER
async function saveUserConfigs(isSilent = false) {
    const rawUrls = document.getElementById("cfgUrls").value.split("\n");
    const rawNames = document.getElementById("cfgSuggestNames").value.split(",");
    const rawValues = document.getElementById("cfgSuggestValues").value.split(",");

    const urlsArray = [];
    rawUrls.forEach(line => {
        if (line.includes("|")) {
            const parts = line.split("|");
            urlsArray.push({ title: parts[0].trim(), url: parts[1].trim() });
        }
    });

    const suggestedNames = rawNames.map(x => x.trim()).filter(x => x !== "");
    const suggestedValues = rawValues.map(x => x.trim()).filter(x => x !== "");

    const newConfigs = {
        urls: urlsArray,
        suggestedNames: suggestedNames,
        suggestedValues: suggestedValues
    };

    if (!isSilent) toggleLoading(true, "Đang ghi nhớ cấu hình mới...");
    const result = await api({ action: "updateUserConfigs", token: getToken(), configs: newConfigs });
    if (!isSilent) toggleLoading(false);

    if (result.success) {
        if (!isSilent) showToast("Cập nhật bộ nhớ cấu hình thành công!", "success");
        // Gọi tải lại configs chạy ngầm để map data ra Datalist gợi ý ngay lập tức
        loadUserConfigs(true); 
    } else {
        if (!isSilent) showToast("Không thể lưu cấu hình: " + result.error, "danger");
    }
}

function showDashboard() {
    document.getElementById("loginCard").style.display = "none";
    document.getElementById("dashboard").style.display = "block";

    // 1. CHUẨN HÓA KIỂU CHÀO, VIẾT HOA CHỮ ĐẦU CỦA USERNAME ĐÚNG VAI TRÒ
    const username = localStorage.getItem("username") || "";
    const role = localStorage.getItem("role") || "";
    const capitalizedUser = username.charAt(0).toUpperCase() + username.slice(1);
    
    let greetingString = "";
    if (role === "admin") {
        greetingString = `Chào quản trị viên <strong>${capitalizedUser}</strong>`;
    } else {
        greetingString = `Chào người dùng <strong>${capitalizedUser}</strong>`;
    }
    
    document.getElementById("userInfo").innerHTML = 
        `${greetingString} | Vai trò: <span class="badge bg-info text-dark">${role}</span>`;

    if (role === "admin") {
        document.getElementById("adminPanel").style.display = "block";
    } else {
        document.getElementById("adminPanel").style.display = "none";
    }

    // Luồng khởi tạo ban đầu đồng bộ mượt với hiệu ứng chờ toàn màn hình
    toggleLoading(true, "Đang thiết lập không gian làm việc...");
    Promise.all([loadData(false), loadUserConfigs(true)]).then(() => {
        toggleLoading(false);
    });
}

if (localStorage.getItem("token")) {
    showDashboard();
}
</script>
