<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>CuongLabs Database</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f4f6f8;
}
.card{
    margin-top:20px;
}
#dashboard{
    display:none;
}
</style>

</head>

<body>

<div class="container">

```
<div id="loginCard" class="card">

    <div class="card-body">

        <h3>Login</h3>

        <input
            id="username"
            class="form-control mb-2"
            placeholder="Username">

        <input
            id="password"
            type="password"
            class="form-control mb-2"
            placeholder="Password">

        <button
            class="btn btn-primary"
            onclick="login()">

            Login

        </button>

    </div>

</div>

<div id="dashboard">

    <div class="card">

        <div class="card-body">

            <div class="d-flex justify-content-between">

                <h3>

                    Dashboard

                </h3>

                <button
                    class="btn btn-danger"
                    onclick="logout()">

                    Logout

                </button>

            </div>

            <div id="userInfo"></div>

        </div>

    </div>

    <div class="card">

        <div class="card-body">

            <h4>Add Data</h4>

            <input
                id="name"
                class="form-control mb-2"
                placeholder="Name">

            <input
                id="value"
                class="form-control mb-2"
                placeholder="Value">

            <button
                class="btn btn-success"
                onclick="addData()">

                Add

            </button>

        </div>

    </div>

    <div
        id="adminPanel"
        class="card"
        style="display:none">

        <div class="card-body">

            <h4>Create User</h4>

            <input
                id="newUser"
                class="form-control mb-2"
                placeholder="Username">

            <input
                id="newPass"
                class="form-control mb-2"
                placeholder="Password">

            <select
                id="newRole"
                class="form-select mb-2">

                <option value="user">
                    user
                </option>

                <option value="admin">
                    admin
                </option>

            </select>

            <button
                class="btn btn-warning"
                onclick="createUser()">

                Create User

            </button>

        </div>

    </div>

    <div class="card">

        <div class="card-body">

            <div class="d-flex justify-content-between">

                <h4>Data</h4>

                <button
                    class="btn btn-primary"
                    onclick="loadData()">

                    Refresh

                </button>

            </div>

            <table
                class="table table-striped">

                <thead>

                <tr>
                    <th>ID</th>
                    <th>Created</th>
                    <th>Name</th>
                    <th>Value</th>
                    <th>User</th>
                    <th>Action</th>
                </tr>

                </thead>

                <tbody id="tbody">
                </tbody>

            </table>

        </div>

    </div>

</div>
```

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbxX4l1AfUFroLcgazD-ijuKLJrnCfRU0U0o8oR4cfVSqmFRlj7h-vhgstqcqBEk4m17/exec";

function getToken(){

    return localStorage
        .getItem("token");

}

function logout(){

    localStorage.clear();

    location.reload();

}

async function api(data){

    const res =
        await fetch(
            API_URL,
            {
                method:"POST",
                body:JSON.stringify(data)
            }
        );

    return await res.json();

}

async function login(){

    const username =
        document.getElementById(
            "username"
        ).value;

    const password =
        document.getElementById(
            "password"
        ).value;

    const result =
        await api({
            action:"login",
            username,
            password
        });

    if(!result.success){

        alert(
            result.error
        );

        return;

    }

    localStorage.setItem(
        "token",
        result.token
    );

    localStorage.setItem(
        "role",
        result.role
    );

    localStorage.setItem(
        "username",
        result.username
    );

    showDashboard();

}

async function loadData(){

    const result =
        await api({
            action:"list",
            token:getToken()
        });

    const tbody =
        document.getElementById(
            "tbody"
        );

    tbody.innerHTML = "";

    result.forEach(row=>{

        let btn = "";

        if(
            localStorage.getItem(
                "role"
            )==="admin"
        ){

            btn =
            `<button
                class="btn btn-sm btn-danger"
                onclick="deleteData('${row.ID}')">
                Delete
            </button>`;

        }

        tbody.innerHTML += `
        <tr>
            <td>${row.ID||""}</td>
            <td>${row.Created||""}</td>
            <td>${row.Name||""}</td>
            <td>${row.Value||""}</td>
            <td>${row.CreatedBy||""}</td>
            <td>${btn}</td>
        </tr>
        `;

    });

}

async function addData(){

    const name =
        document.getElementById(
            "name"
        ).value;

    const value =
        document.getElementById(
            "value"
        ).value;

    const result =
        await api({
            action:"add",
            token:getToken(),
            name,
            value
        });

    if(result.success){

        loadData();

    }

}

async function deleteData(id){

    if(
        !confirm(
            "Delete?"
        )
    ) return;

    await api({
        action:"delete",
        token:getToken(),
        id
    });

    loadData();

}

async function createUser(){

    const username =
        document.getElementById(
            "newUser"
        ).value;

    const password =
        document.getElementById(
            "newPass"
        ).value;

    const role =
        document.getElementById(
            "newRole"
        ).value;

    const result =
        await api({
            action:"createUser",
            token:getToken(),
            username,
            password,
            role
        });

    alert(
        result.success
        ? "Created"
        : result.error
    );

}

function showDashboard(){

    document.getElementById(
        "loginCard"
    ).style.display =
        "none";

    document.getElementById(
        "dashboard"
    ).style.display =
        "block";

    document.getElementById(
        "userInfo"
    ).innerHTML =

        "<b>User:</b> " +

        localStorage.getItem(
            "username"
        ) +

        " | <b>Role:</b> " +

        localStorage.getItem(
            "role"
        );

    if(
        localStorage.getItem(
            "role"
        )==="admin"
    ){

        document.getElementById(
            "adminPanel"
        ).style.display =
            "block";

    }

    loadData();

}

if(
    localStorage.getItem(
        "token"
    )
){

    showDashboard();

}

</script>

</body>
</html>
