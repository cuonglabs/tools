<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Google Sheet DB Demo</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 900px; margin: auto; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        input, button { padding: 8px; margin-right: 4px; }
        button { cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
        th { background-color: #f4f4f4; }
        .btn-edit { background-color: #ffc107; border: none; padding: 5px 10px; }
        .btn-delete { background-color: #dc3545; color: white; border: none; padding: 5px 10px; }
        .action-btns { display: flex; gap: 5px; }
        #status { margin-left: 10px; font-weight: bold; color: green; }
    </style>
</head>
<body>

    <h2>Google Sheet Database Demo</h2>

    <div class="form-group">
        <input type="hidden" id="edit-id"> <input id="name" placeholder="Name">
        <input id="value" placeholder="Value">
        
        <button id="btn-save" onclick="saveData()">Add Record</button>
        <button onclick="resetForm()">Cancel</button>
        <button onclick="loadData()">Refresh Data</button>
        <span id="status"></span>
    </div>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Value</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="tbody">
            <tr><td colspan="3">Loading data...</td></tr>
        </tbody>
    </table>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxX4l1AfUFroLcgazD-ijuKLJrnCfRU0U0o8oR4cfVSqmFRlj7h-vhgstqcqBEk4m17/exec";

    // 1. READ (Lấy dữ liệu)
    async function loadData() {
        showStatus("Loading...");
        try {
            const res = await fetch(API_URL + "?action=list");
            const data = await res.json();
            const tbody = document.getElementById("tbody");
            tbody.innerHTML = "";

            if(data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4">No data found.</td></tr>`;
                showStatus("");
                return;
            }

            data.forEach(row => {
                // 1. Dùng đúng tên cột IN HOA từ Google Sheet: row.NAME, row.VALUE
                const itemName = row.NAME || "";
                const itemValue = row.VALUE || "";

                // 2. Ép kiểu về String trước khi dùng .replace() để tránh lỗi khi đọc số (VD: 1234)
                const safeName = String(itemName).replace(/'/g, "\\'");
                const safeValue = String(itemValue).replace(/'/g, "\\'");

                tbody.innerHTML += `
                <tr>
                    <td>${itemName}</td>
                    <td>${itemValue}</td>
                    <td class="action-btns">
                        <button class="btn-edit" onclick="editRecord('${row.ID}', '${safeName}', '${safeValue}')">Edit</button>
                        <button class="btn-delete" onclick="deleteRecord('${row.ID}')">Delete</button>
                    </td>
                </tr>`;
            });
            showStatus("");
        } catch (error) {
            console.error(error); // In lỗi ra console để dễ debug
            showStatus("Error loading data", "red");
        }
    }

    // 2. CREATE & UPDATE (Thêm mới hoặc Cập nhật)
    async function saveData() {
        const id = document.getElementById("edit-id").value;
        const name = document.getElementById("name").value;
        const value = document.getElementById("value").value;

        if (!name || !value) {
            alert("Vui lòng nhập đầy đủ Name và Value");
            return;
        }

        const isUpdating = id !== "";
        const action = isUpdating ? "update" : "add";
        const payload = { action, name, value };
        if (isUpdating) payload.id = id;

        showStatus(isUpdating ? "Updating..." : "Adding...");
        document.getElementById("btn-save").disabled = true;

        try {
            const res = await fetch(API_URL, {
                method: "POST",
                body: JSON.stringify(payload)
            });
            
            const result = await res.json();
            if (result.success) {
                resetForm();
                loadData();
                showStatus("Success!");
                setTimeout(() => showStatus(""), 2000);
            } else {
                showStatus("Error: " + result.error, "red");
            }
        } catch (error) {
            showStatus("Network Error", "red");
        } finally {
            document.getElementById("btn-save").disabled = false;
        }
    }

    // 3. Chuẩn bị dữ liệu để Sửa (Đẩy dữ liệu lên Form)
    function editRecord(id, name, value) {
        document.getElementById("edit-id").value = id;
        document.getElementById("name").value = name;
        document.getElementById("value").value = value;
        document.getElementById("btn-save").innerText = "Update Record";
    }

    // 4. DELETE (Xóa)
    async function deleteRecord(id) {
        if (!confirm("Bạn có chắc chắn muốn xóa record này?")) return;

        showStatus("Deleting...");
        try {      
            const action = "delete";
            const payload = { action };
            payload.id = id;
            const res = await fetch(API_URL, {
                method: "POST",
                body: JSON.stringify(payload)
            });
            const result = await res.json();
            if (result.success) {
                loadData();
            } else {
                alert("Error deleting: " + result.error);
            }
        } catch (error) {
            showStatus("Error deleting data", "red");
        }
    }

    // Tiện ích: Reset Form
    function resetForm() {
        document.getElementById("edit-id").value = "";
        document.getElementById("name").value = "";
        document.getElementById("value").value = "";
        document.getElementById("btn-save").innerText = "Add Record";
    }

    // Tiện ích: Hiển thị trạng thái
    function showStatus(text, color = "green") {
        const el = document.getElementById("status");
        el.innerText = text;
        el.style.color = color;
    }

    // Khởi chạy khi load trang
    loadData();

</script>
</body>
</html>
